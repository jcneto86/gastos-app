          <router-link to="/" class="btn btn-outline-light btn-sm me-2" exact-active-class="active">

            Gerenciamento
          </router-link>
        </div>
      </div>
    </nav>

    <main class="container">
      <router-view></router-view>
    </main>

    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
      <div v-if="toast.show" class="toast show" :class="'text-bg-' + toast.type">
        <div class="toast-body d-flex justify-content-between align-items-center">
          {{ toast.message }}
          <button type="button" class="btn-close btn-close-white" @click="toast.show = false"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/management.js?v=2"></script>
  <script src="js/app.js"></script>
</body>
</html>
